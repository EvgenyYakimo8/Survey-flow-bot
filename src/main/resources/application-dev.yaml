# Основные настройки приложения
spring:
  application:
    name: Survey-Flow-Bot
  autoconfigure:
    exclude:
      - org.telegram.telegrambots.webhook.starter.TelegramBotStarterConfiguration

server:
  port: 8080

# Настройки бота
telegram:
  bot:
    token: ${BOT_TOKEN}
    username: ${BOT_USERNAME}

# Логирование
logging:
  level:
    io.telegram.bot: DEBUG