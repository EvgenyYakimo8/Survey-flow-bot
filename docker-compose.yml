services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot_app
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      WEBHOOK_URL: ${WEBHOOK_URL}   # публичный URL вашего бота (например, https://your-app.onrender.com/webhook)
    ports:
      - "${HOST_PORT:-8080}:8080"   # порт на хосте (можно задать в .env, по умолчанию 8080)
    volumes:
      - ./logs:/app/logs            # сохраняем логи локально (опционально)